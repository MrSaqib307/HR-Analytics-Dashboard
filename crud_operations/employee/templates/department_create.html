<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add Department</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">👔 Employee Manager</a>
        <div class="d-flex">
            <a href="/" class="btn btn-outline-light me-2">Home</a>
            <a href="/dashboard/" class="btn btn-outline-light me-2">Dashboard</a>
            <a href="/departments/" class="btn btn-outline-light me-2">Departments</a>
            <a href="{% url 'create' %}" class="btn btn-light me-2">Add Employee</a>
            <a href="/logout/" class="btn btn-outline-light">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow" style="max-width: 500px; margin: auto;">
        <div class="card-header bg-success text-white">
            <h4>Add Department</h4>
        </div>
        <div class="card-body">
            <form action="/departments/create/" method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Department Name</label>
                    <input type="text" name="dept_name" class="form-control" placeholder="Enter Department Name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Department Head</label>
                    <input type="text" name="dept_head" class="form-control" placeholder="Enter Head Name">
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="dept_description" class="form-control" placeholder="Enter Description" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-success w-100">Add Department</button>
            </form>
        </div>
    </div>
    <div class="text-center mt-3">
        <a href="/departments/" class="btn btn-secondary">Back to Departments</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
