<!DOCTYPE html>
<html lang="en">
<head>
    <title>Employees</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center mb-4">Employee Management</h2>
        <table class="table table-bordered table-hover table-striped">
            <thead class="table-success">
                <tr>
                    <th>ID</th>
                    <th>Employee ID</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Salary</th>
                    <th>Update</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody>
                {% for x in employees %}
                <tr>
                    <td>{{ x.id }}</td>
                    <td>{{ x.emp_id }}</td>
                    <td>{{ x.emp_name }}</td>
                    <td>{{ x.emp_dept }}</td>
                    <td>{{ x.emp_salary }}</td>
<td><a href="{% url 'update_emp' x.id %}" class="btn btn-warning btn-sm">Update</a></td>
                    <td><a href="{% url 'delete' x.id %}" class="btn btn-danger btn-sm">Delete</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{% url 'create' %}" class="btn btn-success">Add Employee</a>
    </div>
</body>
</html>
