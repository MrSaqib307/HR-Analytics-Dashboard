<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add Employee</title>
    <style>
        .form-container { width: 40%; margin: 50px auto; }
        input { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
        button { padding: 8px 16px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Add Employee</h2>
        <form action="{% url 'create_emp' %}" method="post">
            {% csrf_token %}
            <label>Emp ID</label>
            <input type="number" name="emp_id" placeholder="ID" required>
            <label>Emp Name</label>
            <input type="text" name="emp_name" placeholder="Name" required>
            <label>Emp Dept</label>
            <input type="text" name="emp_dept" placeholder="Department" required>
            <label>Emp Salary</label>
            <input type="number" name="emp_salary" placeholder="Salary" required>
            <button type="submit">Add</button>
        </form>
    </div>
</body>
</html>
